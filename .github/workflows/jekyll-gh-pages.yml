# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Retrieve versions
        uses: octokit/request-action@v2.x
        id: maptool_release
        with:
          route: GET /repos/{owner}/{repo}/releases/latest
          owner: RPTools
          repo: maptool
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          json=$(
          cat <<'EOF'
          ${{ steps.maptool_release.outputs.data }}
          EOF
          )
          echo "$json"
          echo "$json" | jq '{version: .tag_name, url: .html_url, windows: {exe: (first(.assets[] | select(.name | test("\\\\.exe$")).browser_download_url) // null), msi: (first(.assets[] | select(.name | test("\\\\.msi$")).browser_download_url) // null)}, mac: {dmg: (first(.assets[] | select(.name | test("\\\\.dmg$")).browser_download_url) // null), pkg: (first(.assets[] | select(.name | test("\\\\.pkg$")).browser_download_url) // null)}, linux: {deb: (first(.assets[] | select(.name | test("\\\\.rpm$")).browser_download_url) // null), rpm: (first(.assets[] | select(.name | test("\\\\.rpm$")).browser_download_url) // null) }}'
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: .
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
